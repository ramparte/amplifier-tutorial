# Amplifier Ecosystem Manifest
# Generated: 2026-04-02T18:33:49Z
# Purpose: Structured inventory of all ecosystem components for tutorial generation
#
# Changes from previous scan:
# Major ecosystem expansion from ~55 to ~138 components (Jan 2026 → Apr 2026). Key changes: (1) 29 new bundles including language-dev bundles (python-dev, ts-dev, rust-dev) that replace deprecated LSP-specific bundles, plus orchestration, shadow, stories, superpowers, and 14 community bundles; (2) 9 new applications including official amplifierd daemon, amplifier-chat, amplifier-voice, and 6 community apps from robotdad, samueljklee, payneio, DavidKoleczek; (3) 4 new providers (GitHub Copilot, Bedrock, Perplexity, OpenAI Realtime); (4) 10 new tools including community contributions; (5) 13 new hooks including 5 foundation-internal and 4 community; (6) Collections restructured from installable repos (spec-kit, ddd) to curated reference stacks (8 stacks for common workflows); (7) Skills completely replaced (robotdad skills removed, 2 foundation-internal skills added); (8) Example recipes replaced with 6 from main amplifier repo; (9) Foundation examples restructured from 21 numbered tiers to 5 grouped entries; (10) content_priorities section removed. Notable structural improvements: community components now use typed prefixes (community-bundle, community-tool, etc.), deprecated bundles tracked with replacement field, foundation-internal modules tracked with path field.

