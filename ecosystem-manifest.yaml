# =============================================================================
# Core Platform
# =============================================================================

core:
  - id: amplifier
    name: Amplifier
    repo: microsoft/amplifier
    type: application
    description: Main Amplifier project and entry point - installs amplifier-app-cli via uv tool install
    version: "0.1.0"
    priority: 1

  - id: amplifier-core
    name: amplifier-core
    repo: microsoft/amplifier-core
    type: kernel
    description: Rust kernel with Python/Node bindings providing stable contracts for modular AI agent systems
    version: "1.3.3"
    priority: 1
    crates:
      - amplifier-core
      - amplifier-guest
      - amplifier-ffi
    bindings:
      - python
      - node
    protocols:
      - Provider
      - Tool
      - Orchestrator
      - ContextManager
      - Hook
      - Approval

  - id: amplifier-foundation
    name: amplifier-foundation
    repo: microsoft/amplifier-foundation
    type: library
    description: Ultra-thin mechanism layer for bundle composition, module resolution, and shared utilities
    version: "1.0.0"
    priority: 1
    library_modules:
      - bundle
      - cache
      - dicts
      - discovery
      - grpc_adapter
      - io
      - mentions
      - modules
      - paths
      - registry
      - session
      - sources

